<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>67 Animation</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: black;
    }

    .number {
        /* Größe jetzt responsiv: passt sich an Bildschirmbreite an */
        font-size: 25vw; /* 25% der Bildschirmbreite */
        font-weight: bold;
        animation: rotate 3s linear infinite,
                   colorChange 1s infinite alternate;
        text-align: center;
    }

    button {
        margin-top: 5vw; /* Abstand proportional */
        padding: 3vw 6vw; /* padding proportional */
        font-size: 5vw; /* Schriftgröße proportional */
        cursor: pointer;
        border: none;
        border-radius: 2vw;
        background: white;
    }

    button:hover {
        background: yellow;
    }

    @keyframes rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }

    @keyframes colorChange {
        0% { color: red; }
        25% { color: yellow; }
        50% { color: lime; }
        75% { color: cyan; }
        100% { color: magenta; }
    }
</style>
</head>

<body>

<div class="number">67</div>

<button onclick="window.location.href='bild.html'">
    Zu meinem Bild
</button>

</body>
</html>
