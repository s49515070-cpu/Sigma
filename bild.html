<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mein Bild</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: black;
    }

    img {
        /* Bild maximal groß, responsiv und proportional */
        max-width: 90vw;   /* max. 90% der Bildschirmbreite */
        max-height: 80vh;  /* max. 80% der Bildschirmhöhe */
        width: auto;
        height: auto;
        border-radius: 1vw;  /* optional abgerundete Ecken */
        box-shadow: 0 0 20px white;
    }

    button {
        margin-top: 5vw;
        padding: 3vw 6vw;
        font-size: 5vw;
        cursor: pointer;
        border: none;
        border-radius: 2vw;
        background: white;
    }

    button:hover {
        background: yellow;
    }
</style>
</head>

<body>

<img src="deinbild.jpg" alt="Mein Bild">

<button onclick="window.location.href='index.html'">
    Zurück zur Animation
</button>

</body>
</html>
